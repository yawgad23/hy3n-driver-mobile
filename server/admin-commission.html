<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HY3N Admin — Commission Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #0a0a0a;
      color: #fafafa;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    header {
      margin-bottom: 30px;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 20px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #d4af37;
    }
    .subtitle {
      color: #9ca3af;
      font-size: 14px;
    }
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    input, select {
      padding: 10px 12px;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #fafafa;
      border-radius: 6px;
      font-size: 14px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #d4af37;
    }
    button {
      padding: 10px 16px;
      background: #d4af37;
      color: #000;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #e5c158;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .status-paid {
      background: #22c55e20;
      color: #22c55e;
    }
    .status-processing {
      background: #f59e0b20;
      color: #f59e0b;
    }
    .status-failed {
      background: #ef444420;
      color: #ef4444;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #111111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      overflow: hidden;
    }
    th {
      background: #1a1a1a;
      padding: 12px;
      text-align: left;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #9ca3af;
      border-bottom: 1px solid #2a2a2a;
    }
    td {
      padding: 12px;
      border-bottom: 1px solid #2a2a2a;
      font-size: 14px;
    }
    tr:hover {
      background: #1a1a1a;
    }
    .driver-name {
      font-weight: 600;
      color: #d4af37;
    }
    .actions {
      display: flex;
      gap: 6px;
    }
    .btn-small {
      padding: 6px 10px;
      font-size: 12px;
      background: #2a2a2a;
      color: #fafafa;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-small:hover {
      background: #3a3a3a;
    }
    .btn-small.success {
      background: #22c55e20;
      color: #22c55e;
      border-color: #22c55e40;
    }
    .btn-small.danger {
      background: #ef444420;
      color: #ef4444;
      border-color: #ef444440;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #9ca3af;
    }
    .error {
      background: #ef444420;
      border: 1px solid #ef444440;
      color: #ef4444;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 16px;
    }
    .stat-label {
      font-size: 12px;
      color: #9ca3af;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #d4af37;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 24px;
      max-width: 400px;
      width: 90%;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #d4af37;
    }
    .modal-body {
      margin-bottom: 20px;
      color: #9ca3af;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .modal-actions button {
      flex: 1;
    }
    .modal-actions .cancel {
      background: #2a2a2a;
      color: #fafafa;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>💰 Commission Dashboard</h1>
      <p class="subtitle">Manage driver daily platform fee payments</p>
    </header>

    <div id="error" class="error" style="display: none;"></div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total Today</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Paid</div>
        <div class="stat-value" id="stat-paid">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Processing</div>
        <div class="stat-value" id="stat-processing">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Failed</div>
        <div class="stat-value" id="stat-failed">—</div>
      </div>
    </div>

    <div class="controls">
      <input type="date" id="dateFilter" placeholder="Filter by date">
      <input type="text" id="driverFilter" placeholder="Filter by driver name">
      <select id="statusFilter">
        <option value="">All Statuses</option>
        <option value="paid">Paid</option>
        <option value="processing">Processing</option>
        <option value="failed">Failed</option>
      </select>
      <button onclick="loadCommissions()">Refresh</button>
    </div>

    <div id="loading" class="loading" style="display: none;">Loading commissions...</div>
    <table id="commissionsTable" style="display: none;">
      <thead>
        <tr>
          <th>Driver</th>
          <th>Date</th>
          <th>Amount</th>
          <th>MoMo</th>
          <th>Status</th>
          <th>Hubtel Ref</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="commissionsBody"></tbody>
    </table>
  </div>

  <!-- Override Modal -->
  <div id="overrideModal" class="modal">
    <div class="modal-content">
      <div class="modal-title">Override Commission Status</div>
      <div class="modal-body">
        <p id="overrideInfo"></p>
        <div style="margin-top: 12px;">
          <label style="display: block; margin-bottom: 8px;">
            <input type="radio" name="newStatus" value="paid"> Mark as Paid
          </label>
          <label style="display: block;">
            <input type="radio" name="newStatus" value="failed"> Mark as Failed
          </label>
        </div>
      </div>
      <div class="modal-actions">
        <button class="cancel" onclick="closeOverrideModal()">Cancel</button>
        <button onclick="confirmOverride()">Update</button>
      </div>
    </div>
  </div>

  <script>
    let allCommissions = [];
    let currentOverride = null;

    async function loadCommissions() {
      const dateFilter = document.getElementById('dateFilter').value;
      const driverFilter = document.getElementById('driverFilter').value.toLowerCase();
      const statusFilter = document.getElementById('statusFilter').value;

      document.getElementById('loading').style.display = 'block';
      document.getElementById('commissionsTable').style.display = 'none';
      document.getElementById('error').style.display = 'none';

      try {
        // In a real app, this would call an API endpoint
        // For now, we'll fetch from Firestore directly (requires auth)
        // This is a placeholder — you'd implement this via tRPC
        
        // Simulated data for demo
        allCommissions = [];
        
        // Apply filters
        let filtered = allCommissions;
        if (dateFilter) {
          filtered = filtered.filter(c => c.date === dateFilter);
        }
        if (driverFilter) {
          filtered = filtered.filter(c => c.driver_name.toLowerCase().includes(driverFilter));
        }
        if (statusFilter) {
          filtered = filtered.filter(c => c.status === statusFilter);
        }

        renderCommissions(filtered);
        updateStats(allCommissions);
      } catch (err) {
        document.getElementById('error').textContent = 'Failed to load commissions: ' + err.message;
        document.getElementById('error').style.display = 'block';
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    function renderCommissions(commissions) {
      const tbody = document.getElementById('commissionsBody');
      tbody.innerHTML = '';

      if (commissions.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #9ca3af;">No commissions found</td></tr>';
        document.getElementById('commissionsTable').style.display = 'table';
        return;
      }

      commissions.forEach(c => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td><span class="driver-name">${c.driver_name || 'Unknown'}</span></td>
          <td>${c.date}</td>
          <td>GH₵${c.amount || 0}</td>
          <td>${c.momo_number || '—'}</td>
          <td><span class="status-badge status-${c.status}">${c.status}</span></td>
          <td style="font-size: 12px; color: #9ca3af;">${c.hubtel_reference?.substring(0, 20) || '—'}...</td>
          <td>
            <div class="actions">
              <button class="btn-small success" onclick="openOverrideModal('${c.id}', '${c.driver_name}', 'paid')">✓ Paid</button>
              <button class="btn-small danger" onclick="openOverrideModal('${c.id}', '${c.driver_name}', 'failed')">✗ Failed</button>
            </div>
          </td>
        `;
        tbody.appendChild(row);
      });

      document.getElementById('commissionsTable').style.display = 'table';
    }

    function updateStats(commissions) {
      const total = commissions.length;
      const paid = commissions.filter(c => c.status === 'paid' || c.status === 'confirmed').length;
      const processing = commissions.filter(c => c.status === 'processing').length;
      const failed = commissions.filter(c => c.status === 'failed').length;

      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-paid').textContent = paid;
      document.getElementById('stat-processing').textContent = processing;
      document.getElementById('stat-failed').textContent = failed;
    }

    function openOverrideModal(id, driverName, status) {
      currentOverride = { id, status };
      document.getElementById('overrideInfo').textContent = `Update ${driverName}'s commission to "${status}"?`;
      document.querySelector(`input[name="newStatus"][value="${status}"]`).checked = true;
      document.getElementById('overrideModal').classList.add('active');
    }

    function closeOverrideModal() {
      document.getElementById('overrideModal').classList.remove('active');
      currentOverride = null;
    }

    async function confirmOverride() {
      if (!currentOverride) return;
      // TODO: Call API to update commission status
      console.log('Override:', currentOverride);
      closeOverrideModal();
      loadCommissions();
    }

    // Load on page load
    loadCommissions();
  </script>
</body>
</html>
